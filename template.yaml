AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  HooRay-Relay — production-grade webhook delivery system.
  Provisions all shared infrastructure: DynamoDB tables, SQS queue + DLQ,
  and the ingestion Lambda function.

# ---------------------------------------------------------------------------
# Parameters — override at deploy time with --parameter-overrides
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment (used as a suffix on resource names and metric dimension).

  SqsVisibilityTimeoutSeconds:
    Type: Number
    Default: 60
    Description: >
      How long (seconds) a message is hidden from other consumers after being
      received by the delivery worker.

  SqsMaxReceiveCount:
    Type: Number
    Default: 4
    Description: >
      Maximum number of times a message is delivered before being moved to the
      DLQ.  Set to max_retries + 1 (initial attempt counts as 1).

  EnableEcsWorker:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Enable ECS/Fargate resources for the delivery worker.

  WorkerImageUri:
    Type: String
    Default: ""
    Description: Full container image URI (including tag) for the worker task.

  WorkerDesiredCount:
    Type: Number
    Default: 1
    Description: Desired number of ECS worker tasks.

  WorkerCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]
    Description: ECS task CPU units for the worker.

  WorkerMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "3072", "4096", "5120", "6144", "7168", "8192"]
    Description: ECS task memory (MiB) for the worker.

  WorkerAssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: Assign public IP to ECS worker tasks.

  EcsSubnetIds:
    Type: String
    Default: "subnet-00000000"
    Description: Comma-separated subnet IDs for ECS worker tasks (override when EnableEcsWorker=true).

  EcsSecurityGroupIds:
    Type: String
    Default: "sg-00000000"
    Description: Comma-separated security group IDs for ECS worker tasks (override when EnableEcsWorker=true).

Conditions:
  CreateEcsWorker: !Equals [!Ref EnableEcsWorker, "true"]

# ---------------------------------------------------------------------------
# Globals — applied to all SAM functions
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: provided.al2023   # Amazon Linux 2023 — required for Rust Lambdas
    Architectures: [arm64]     # Graviton2: cheaper + faster for Rust workloads
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        EVENTS_TABLE: !Ref WebhookEventsTable
        IDEMPOTENCY_TABLE: !Ref WebhookIdempotencyTable
        CONFIGS_TABLE: !Ref WebhookConfigsTable
        QUEUE_URL: !Ref WebhookDeliveryQueue

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # -------------------------------------------------------------------------
  # DynamoDB Table 1: webhook_events
  # Owned by: both engineers (Eng1 writes, Eng2 reads/updates)
  # -------------------------------------------------------------------------
  WebhookEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webhook_events_${Environment}"
      BillingMode: PAY_PER_REQUEST   # on-demand — no capacity planning for MVP
      # Primary key
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        # GSI1 attributes (retry queue — reserved for Week 2)
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # GSI1: query events ready for retry by timestamp
      # GSI1PK = "RETRY", GSI1SK = "NEXT#{timestamp}#EVENT#{event_id}"
      GlobalSecondaryIndexes:
        - IndexName: gsi1-retry-index
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # 30-day auto-expiry of old event records
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: shared

  # -------------------------------------------------------------------------
  # DynamoDB Table 2: webhook_idempotency
  # Owned by: Engineer 1 (ingestion layer)
  # -------------------------------------------------------------------------
  WebhookIdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webhook_idempotency_${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      # 24-hour auto-expiry — DynamoDB TTL handles cleanup, no Lambda needed
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: engineer1

  # -------------------------------------------------------------------------
  # DynamoDB Table 3: webhook_configs
  # Owned by: Engineer 1 (config CRUD) — read by Engineer 2 (delivery)
  # -------------------------------------------------------------------------
  WebhookConfigsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "webhook_configs_${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: engineer1

  # -------------------------------------------------------------------------
  # SQS: Dead-Letter Queue
  # Messages land here when max_receive_count is exceeded.
  # Engineer 2 owns the alarm; shared infra definition.
  # -------------------------------------------------------------------------
  WebhookDeliveryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "webhook_delivery_dlq_${Environment}"
      # Retain failed messages for 14 days for investigation
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # SQS: Main delivery queue
  # Engineer 1 enqueues; Engineer 2 polls.
  # -------------------------------------------------------------------------
  WebhookDeliveryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "webhook_delivery_${Environment}"
      VisibilityTimeout: !Ref SqsVisibilityTimeoutSeconds
      # Retain unprocessed messages for 4 days
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WebhookDeliveryDLQ.Arn
        maxReceiveCount: !Ref SqsMaxReceiveCount
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment

  # -------------------------------------------------------------------------
  # CloudWatch Alarm: DLQ depth > 0  (contract item §9)
  # -------------------------------------------------------------------------
  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "hooray-relay-dlq-depth-${Environment}"
      AlarmDescription: "Messages in webhook DLQ — investigate delivery failures"
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt WebhookDeliveryDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # -------------------------------------------------------------------------
  # Lambda: Ingestion (Engineer 1)
  # Placeholder — binary will be provided by `cargo lambda build`
  # -------------------------------------------------------------------------
  IngestionFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "hooray-relay-ingestion-${Environment}"
      CodeUri: .
      Handler: bootstrap   # Rust Lambda bootstrap binary name
      Timeout: 30
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebhookEventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WebhookIdempotencyTable
        - DynamoDBCrudPolicy:
            TableName: !Ref WebhookConfigsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt WebhookDeliveryQueue.QueueName
      Events:
        ReceiveWebhook:
          Type: Api
          Properties:
            Path: /webhooks/receive
            Method: POST
        CreateConfig:
          Type: Api
          Properties:
            Path: /webhooks/configs
            Method: POST
        GetConfig:
          Type: Api
          Properties:
            Path: /webhooks/configs
            Method: GET

  # -------------------------------------------------------------------------
  # ECS/Fargate Worker (Engineer 2) - optional, controlled by EnableEcsWorker
  # -------------------------------------------------------------------------
  WorkerLogGroup:
    Condition: CreateEcsWorker
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/hooray-relay-worker-${Environment}"
      RetentionInDays: 14

  WorkerEcsCluster:
    Condition: CreateEcsWorker
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "hooray-relay-worker-${Environment}"
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: engineer2

  WorkerTaskExecutionRole:
    Condition: CreateEcsWorker
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hooray-relay-worker-exec-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: engineer2

  WorkerTaskRole:
    Condition: CreateEcsWorker
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "hooray-relay-worker-task-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerSqsDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt WebhookDeliveryQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt WebhookEventsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt WebhookConfigsTable.Arn
      Tags:
        - Key: Project
          Value: hooray-relay
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: engineer2

  WorkerTaskDefinition:
    Condition: CreateEcsWorker
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "hooray-relay-worker-${Environment}"
      Cpu: !Ref WorkerCpu
      Memory: !Ref WorkerMemory
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt WorkerTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref WorkerImageUri
          Essential: true
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: QUEUE_URL
              Value: !Ref WebhookDeliveryQueue
            - Name: EVENTS_TABLE
              Value: !Ref WebhookEventsTable
            - Name: CONFIGS_TABLE
              Value: !Ref WebhookConfigsTable
            - Name: RUST_LOG
              Value: info
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WorkerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  WorkerEcsService:
    Condition: CreateEcsWorker
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "hooray-relay-worker-${Environment}"
      Cluster: !Ref WorkerEcsCluster
      TaskDefinition: !Ref WorkerTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref WorkerDesiredCount
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref WorkerAssignPublicIp
          SecurityGroups: !Split [",", !Ref EcsSecurityGroupIds]
          Subnets: !Split [",", !Ref EcsSubnetIds]

# ---------------------------------------------------------------------------
# Outputs — referenced by both engineers in local testing and CI
# ---------------------------------------------------------------------------
Outputs:
  EventsTableName:
    Description: "webhook_events DynamoDB table name"
    Value: !Ref WebhookEventsTable
    Export:
      Name: !Sub "hooray-relay-events-table-${Environment}"

  IdempotencyTableName:
    Description: "webhook_idempotency DynamoDB table name"
    Value: !Ref WebhookIdempotencyTable
    Export:
      Name: !Sub "hooray-relay-idempotency-table-${Environment}"

  ConfigsTableName:
    Description: "webhook_configs DynamoDB table name"
    Value: !Ref WebhookConfigsTable
    Export:
      Name: !Sub "hooray-relay-configs-table-${Environment}"

  QueueUrl:
    Description: "SQS delivery queue URL"
    Value: !Ref WebhookDeliveryQueue
    Export:
      Name: !Sub "hooray-relay-queue-url-${Environment}"

  DLQUrl:
    Description: "SQS dead-letter queue URL"
    Value: !Ref WebhookDeliveryDLQ
    Export:
      Name: !Sub "hooray-relay-dlq-url-${Environment}"

  IngestionApiUrl:
    Description: "API Gateway URL for the ingestion Lambda"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  WorkerEcsClusterName:
    Condition: CreateEcsWorker
    Description: "ECS cluster name for worker service"
    Value: !Ref WorkerEcsCluster

  WorkerEcsServiceName:
    Condition: CreateEcsWorker
    Description: "ECS service name for worker"
    Value: !Ref WorkerEcsService
